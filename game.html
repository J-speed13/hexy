        /* Custom Purple Button */
        .btn-purple {
            background: #9333ea; /* Purple-600 */
            color: white;
            padding: 16px 40px;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 1.25rem;
            transition: all 0.2s;
            box-shadow: 0 4px 14px 0 rgba(147, 51, 234, 0.39);
            border: none;
            cursor: pointer;
        }

        .btn-purple:hover {
            background: #7e22ce; /* Purple-700 */
        }

        .btn-purple:active {
            transform: scale(0.95);
        }

        /* Custom Small Outline Button */
        .btn-purple-small {
            background: transparent;
            color: #d8b4fe;
            border: 2px solid #9333ea;
            padding: 8px 24px;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-purple-small:hover {
            background: rgba(147, 51, 234, 0.2);
            color: #ffffff;
        }

        .btn-purple-small:active {
            transform: scale(0.95);
        }

        /* Game Styles */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        canvas {
            cursor: pointer;
            max-width: 100%;
            height: auto;
            background: rgba(15, 23, 42, 0.85); /* Slightly darken canvas to ensure grid is visible over custom background */
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 2rem;
            text-align: center;
        }

        .bg-dark-overlay {
            background: rgba(15, 23, 42, 0.98);
            border-radius: 12px;
        }

        .score-panel {
            background: rgba(15, 23, 42, 0.85);
            padding: 1rem;
            border-radius: 12px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 14px 32px;
            border-radius: 9999px;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
            border: none;
            cursor: pointer;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #3b82f6;
            color: #3b82f6;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Home Screen -->
        <div id="home-screen" class="screen-overlay">
            <button onclick="startGame()" class="btn-purple">Start Playing</button>
            <a href="rules.html" class="btn-purple-small mt-6">Rules</a>
        </div>

        <!-- Game HUD -->
        <div id="game-hud" class="score-panel hidden">
            <div class="flex justify-between w-72 mx-auto">
                <div>
                    <p class="text-[10px] uppercase text-slate-400 tracking-widest">Score</p>
                    <p id="current-score" class="text-2xl font-bold">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] uppercase text-slate-400 tracking-widest">Level</p>
                    <p id="current-level" class="text-2xl font-bold text-purple-400">1</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] uppercase text-slate-400 tracking-widest">Best</p>
                    <p id="high-score" class="text-2xl font-bold">0</p>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" class="hidden"></canvas>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen-overlay bg-dark-overlay hidden">
            <h2 class="text-4xl font-bold mb-2">Game Over</h2>
            <p id="final-score-text" class="text-2xl mb-2 text-blue-400 font-bold">0</p>
            <p id="rank-text" class="text-sm text-slate-400 mb-6 italic"></p>
            
            <div class="flex flex-col gap-3">
                <button onclick="resetGame()" class="btn w-48">Try Again</button>
                <button onclick="showHome()" class="btn btn-outline w-48">Main Menu</button>
            </div>
        </div>
    </div>

<script>
    /**
     * HEXY - Game Logic
     */

    // --- Game Logic ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('current-score');
    const highEl = document.getElementById('high-score');
    const homeScreen = document.getElementById('home-screen');
    const hud = document.getElementById('game-hud');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreText = document.getElementById('final-score-text');

    const GRID_RADIUS = 5;
    const HEX_SIZE = 24;
    const GAP = 2;
    const PIECE_SCALE = 0.6;
    
    let score = 0;
    let level = 1;
    let highScore = parseInt(localStorage.getItem('hexy-highscore')) || 0;
    let grid = [];
    let pieces = [];
    let draggingPiece = null;
    let dragOffset = { x: 0, y: 0 };
    let mousePos = { x: 0, y: 0 };
    let isGameRunning = false;

    const COLORS = ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6'];
    
    // Level 1: Basic shapes (1 to 3 hexes)
    const BASIC_SHAPES = [
        [{q:0, r:0}], 
        [{q:0, r:0}, {q:1, r:0}], 
        [{q:0, r:0}, {q:0, r:1}], 
        [{q:0, r:0}, {q:1, r:-1}], 
        [{q:0, r:0}, {q:1, r:0}, {q:2, r:0}], 
        [{q:0, r:0}, {q:1, r:0}, {q:0, r:1}], 
        [{q:0, r:0}, {q:1, r:-1}, {q:1, r:0}]
    ];

    // Level 2: Medium shapes (4 hexes)
    const MEDIUM_SHAPES = [
        [{q:0, r:0}, {q:1, r:0}, {q:2, r:0}, {q:3, r:0}], // 4-line
        [{q:0, r:0}, {q:0, r:1}, {q:0, r:2}, {q:0, r:3}], // 4-line vertical
        [{q:0, r:0}, {q:1, r:-1}, {q:2, r:-2}, {q:3, r:-3}], // 4-line diagonal
        [{q:0, r:0}, {q:1, r:0}, {q:1, r:1}, {q:2, r:1}], // Z-shape
        [{q:0, r:0}, {q:0, r:1}, {q:1, r:0}, {q:1, r:-1}], // Diamond
        [{q:0, r:0}, {q:1, r:0}, {q:2, r:0}, {q:1, r:1}] // T-shape
    ];

    // Level 3: Hard shapes (5+ hexes)
    const HARD_SHAPES = [
        [{q:0, r:0}, {q:1, r:0}, {q:2, r:0}, {q:3, r:0}, {q:4, r:0}], // 5-line
        [{q:0, r:0}, {q:1, r:0}, {q:2, r:0}, {q:0, r:1}, {q:0, r:2}], // Big L-shape
        [{q:0, r:0}, {q:1, r:0}, {q:0, r:1}, {q:-1, r:1}, {q:-1, r:0}, {q:0, r:-1}, {q:1, r:-1}] // 7-hex Flower!
    ];

    highEl.innerText = highScore;

    function initCanvas() {
        const scale = window.devicePixelRatio || 1;
        canvas.width = 400 * scale;
        canvas.height = 550 * scale;
        canvas.style.width = '400px';
        canvas.style.height = '550px';
        ctx.scale(scale, scale);
    }

    function createGrid() {
        grid = [];
        for (let q = -GRID_RADIUS + 1; q < GRID_RADIUS; q++) {
            let r1 = Math.max(-GRID_RADIUS + 1, -q - GRID_RADIUS + 1);
            let r2 = Math.min(GRID_RADIUS - 1, -q + GRID_RADIUS - 1);
            for (let r = r1; r <= r2; r++) {
                grid.push({ q, r, color: null });
            }
        }
    }

    function generatePieces() {
        pieces = [];
        
        // Define the shape pool based on the current level
        let availableShapes = [...BASIC_SHAPES];
        if (level >= 2) availableShapes = availableShapes.concat(MEDIUM_SHAPES);
        if (level >= 3) availableShapes = availableShapes.concat(HARD_SHAPES);
        
        // At level 5 and beyond, STOP spawning easy pieces entirely!
        if (level >= 5) availableShapes = [...MEDIUM_SHAPES, ...HARD_SHAPES];

        for (let i = 0; i < 3; i++) {
            const shapeIndex = Math.floor(Math.random() * availableShapes.length);
            const colorIndex = Math.floor(Math.random() * COLORS.length);
            pieces.push({
                shape: availableShapes[shapeIndex],
                color: COLORS[colorIndex],
                x: 80 + i * 120,
                y: 480,
                active: true
            });
        }
        checkGameOver();
    }

    function hexToPixel(q, r, size = HEX_SIZE) {
        const x = size * (3/2 * q) + 200;
        const y = size * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r) + 220;
        return { x, y };
    }

    function pixelToHex(x, y) {
        const q = (2/3 * (x - 200)) / HEX_SIZE;
        const r = (-1/3 * (x - 200) + Math.sqrt(3)/3 * (y - 220)) / HEX_SIZE;
        return axialRound(q, r);
    }

    function axialRound(q, r) {
        let x = q, y = r, z = -q - r;
        let rx = Math.round(x), ry = Math.round(y), rz = Math.round(z);
        const xDiff = Math.abs(rx - x), yDiff = Math.abs(ry - y), zDiff = Math.abs(rz - z);
        if (xDiff > yDiff && xDiff > zDiff) rx = -ry - rz;
        else if (yDiff > zDiff) ry = -rx - rz;
        else rz = -rx - ry;
        return { q: rx, r: ry };
    }

    function drawHex(x, y, color, size = HEX_SIZE, alpha = 1) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const angle = 2 * Math.PI / 6 * i;
            const px = x + (size - GAP) * Math.cos(angle);
            const py = y + (size - GAP) * Math.sin(angle);
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = color;
        ctx.fill();
        ctx.globalAlpha = 1;
    }

    function drawLoop() {
        if (!isGameRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        grid.forEach(cell => {
            const pos = hexToPixel(cell.q, cell.r);
            drawHex(pos.x, pos.y, cell.color || '#1e293b');
        });

        pieces.forEach(p => {
            if (!p.active) return;
            const isDragging = draggingPiece === p;
            const scale = isDragging ? 1.0 : PIECE_SCALE;
            const currentX = isDragging ? mousePos.x + dragOffset.x : p.x;
            const currentY = isDragging ? mousePos.y + dragOffset.y : p.y;

            p.shape.forEach(hex => {
                const pos = hexToPixel(hex.q, hex.r, HEX_SIZE * scale);
                const ox = pos.x - 200 + currentX;
                const oy = pos.y - 220 + currentY;
                drawHex(ox, oy, p.color, HEX_SIZE * scale);
            });
        });

        if (draggingPiece) {
            const targetHex = pixelToHex(mousePos.x + dragOffset.x, mousePos.y + dragOffset.y);
            if (canPlace(draggingPiece, targetHex)) {
                draggingPiece.shape.forEach(hex => {
                    const pos = hexToPixel(targetHex.q + hex.q, targetHex.r + hex.r);
                    drawHex(pos.x, pos.y, draggingPiece.color, HEX_SIZE, 0.4);
                });
            }
        }
        requestAnimationFrame(drawLoop);
    }

    function canPlace(piece, anchor) {
        return piece.shape.every(hex => {
            const q = anchor.q + hex.q;
            const r = anchor.r + hex.r;
            const cell = grid.find(c => c.q === q && c.r === r);
            return cell && !cell.color;
        });
    }

    function placePiece(piece, anchor) {
        piece.shape.forEach(hex => {
            const cell = grid.find(c => c.q === anchor.q + hex.q && c.r === anchor.r + hex.r);
            cell.color = piece.color;
        });
        piece.active = false;
        score += piece.shape.length * 10;
        updateScoreDisplay();
        checkLines();

        if (pieces.every(p => !p.active)) {
            generatePieces();
        } else {
            checkGameOver();
        }
    }

    function checkLines() {
        const toClear = new Set();
        const check = (key) => {
            const groups = {};
            grid.forEach(c => {
                const val = key === 's' ? -c.q - c.r : c[key];
                if (!groups[val]) groups[val] = [];
                groups[val].push(c);
            });
            for (let val in groups) {
                const group = groups[val];
                const expected = 10 - Math.abs(parseInt(val)) - 1; 
                if (group.every(c => c.color)) {
                    group.forEach(c => toClear.add(c));
                }
            }
        };
        check('q'); check('r'); check('s');
        if (toClear.size > 0) {
            score += toClear.size * 15;
            toClear.forEach(c => c.color = null);
            updateScoreDisplay();
        }
    }

    function updateScoreDisplay() {
        scoreEl.innerText = score;
        
        // Increase level every 250 points
        level = Math.floor(score / 250) + 1;
        document.getElementById('current-level').innerText = level;

        if (score > highScore) {
            highScore = score;
            highEl.innerText = highScore;
            
            try {
                localStorage.setItem('hexy-highscore', highScore.toString());
            } catch(e) {
                console.warn("Local storage is restricted in this browser environment.", e);
            }
        }
    }

    // --- State Transitions ---

    function showHome() {
        isGameRunning = false;
        homeScreen.classList.remove('hidden');
        hud.classList.add('hidden');
        canvas.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
    }

    function startGame() {
        isGameRunning = true;
        score = 0;
        level = 1;
        document.getElementById('current-level').innerText = level;
        updateScoreDisplay();
        initCanvas();
        createGrid();
        generatePieces();
        
        homeScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        hud.classList.remove('hidden');
        canvas.classList.remove('hidden');
        
        requestAnimationFrame(drawLoop);
    }

    function resetGame() {
        startGame();
    }

    function checkGameOver() {
        const activePieces = pieces.filter(p => p.active);
        const canMove = activePieces.some(p => {
            return grid.some(cell => canPlace(p, { q: cell.q, r: cell.r }));
        });

        if (!canMove && activePieces.length > 0) {
            triggerGameOver();
        }
    }

    async function triggerGameOver() {
        isGameRunning = false;
        finalScoreText.innerText = score;
        gameOverScreen.classList.remove('hidden');
        
        if (currentUser && db) {
            try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('leaderboard').add({
                    userId: currentUser.uid,
                    score: score,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (e) {
                console.error("Score save error:", e);
            }
        }
    }

    // --- Interaction ---
    function handleInputStart(x, y) {
        if (!isGameRunning) return;
        const rect = canvas.getBoundingClientRect();
        mousePos = { x: x - rect.left, y: y - rect.top };

        pieces.forEach(p => {
            if (!p.active) return;
            const dx = mousePos.x - p.x;
            const dy = mousePos.y - p.y;
            if (Math.sqrt(dx*dx + dy*dy) < 40) {
                draggingPiece = p;
                dragOffset = { x: p.x - mousePos.x, y: p.y - mousePos.y };
            }
        });
    }

    function handleInputMove(x, y) {
        const rect = canvas.getBoundingClientRect();
        mousePos = { x: x - rect.left, y: y - rect.top };
    }

    function handleInputEnd() {
        if (draggingPiece) {
            const targetHex = pixelToHex(mousePos.x + dragOffset.x, mousePos.y + dragOffset.y);
            if (canPlace(draggingPiece, targetHex)) {
                placePiece(draggingPiece, targetHex);
            }
            draggingPiece = null;
        }
    }

    window.addEventListener('mousedown', e => handleInputStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => handleInputMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', handleInputEnd);
    window.addEventListener('touchstart', e => handleInputStart(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('touchmove', e => {
        handleInputMove(e.touches[0].clientX, e.touches[0].clientY);
        if (draggingPiece) e.preventDefault();
    }, { passive: false });
    window.addEventListener('touchend', handleInputEnd);

</script>
</body>
</html>
