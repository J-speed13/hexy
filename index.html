<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexy</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:Arial;
    color:white;
}

.container{
    text-align:center;
}

h1{
    font-size:50px;
    margin-bottom:40px;
}

.buttons{
    display:flex;
    gap:20px;
    justify-content:center;
}

a{
    text-decoration:none;
}

button{
    width:150px;
    height:60px;
    font-size:22px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#1d4ed8;
    transform:scale(1.05);
}

</style>
</head>
<body>

<div class="container">

    <h1>Hexy</h1>

    <div class="buttons">

        <a href="game.html">
            <button>Game</button>
        </a>

        <a href="ai.html">
            <button>AI</button>
        </a>

    </div>

</div>

</body>
</html>
