<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexy AI</title>

<style>

body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:420px;
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.top{
    background:#2563eb;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

#chat{
    height:420px;
    overflow-y:auto;
    padding:10px;
}

.msg{
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    max-width:80%;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.bot{
    background:#334155;
}

.bottom{
    display:flex;
}

input{
    flex:1;
    padding:15px;
    border:none;
    outline:none;
    background:#0f172a;
    color:white;
    font-size:16px;
}

button{
    border:none;
    padding:15px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.help{
    text-align:center;
    font-size:12px;
    color:#94a3b8;
    padding:8px;
}

</style>
</head>
<body>

<div class="app">

    <div class="top">Hexy AI</div>

    <div id="chat"></div>

    <div class="bottom">
        <input type="text" id="input" placeholder="Talk to Hexy...">
        <button onclick="send()">Send</button>
    </div>

    <div class="help">
        Teach Hexy like:<br>
        learn that the sky is blue
    </div>

</div>

<script>

const chat = document.getElementById("chat");
const input = document.getElementById("input");

// Load saved memory
let memory = JSON.parse(localStorage.getItem("hexyMemory")) || {};

function addMessage(text,type){

    let div = document.createElement("div");

    div.className = "msg " + type;
    div.innerText = text;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

function saveMemory(){
    localStorage.setItem("hexyMemory", JSON.stringify(memory));
}

function ai(message){

    let msg = message.toLowerCase().trim();

    // Learning system
    // learn that the sky is blue

    if(msg.startsWith("learn that ")){

        let sentence = msg.replace("learn that ","");

        if(sentence.includes(" is ")){

            let parts = sentence.split(" is ");

            let question = parts[0].trim();
            let answer = parts.slice(1).join(" is ").trim();

            memory[question] = answer;

            saveMemory();

            return "Okay! I learned that " + question + " is " + answer;
        }
    }

    // Learned responses
    if(memory[msg]){
        return memory[msg];
    }

    // Smart matching
    for(let key in memory){

        if(msg.includes(key)){
            return key + " is " + memory[key];
        }
    }

    // Built in replies
    if(msg.includes("hello") || msg.includes("hi")){
        return "Hello 👋";
    }

    if(msg.includes("your name")){
        return "I'm Hexy AI!";
    }

    if(msg.includes("how are you")){
        return "I'm doing good!";
    }

    return "I don't know that yet. Teach me something!";
}

function send(){

    let text = input.value.trim();

    if(text === "") return;

    addMessage(text,"user");

    let response = ai(text);

    setTimeout(()=>{
        addMessage(response,"bot");
    },300);

    input.value = "";
}

input.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        send();
    }

});

addMessage("Hello! I'm Hexy AI 🤖","bot");
addMessage("Teach me with sentences like: learn that the sky is blue","bot");

</script>

</body>
</html>
