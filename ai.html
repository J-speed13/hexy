<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexy AI</title>

<style>
    body{
        margin:0;
        font-family:Arial;
        background:#0f172a;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .app{
        width:400px;
        background:#1e293b;
        border-radius:15px;
        overflow:hidden;
        box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    .top{
        background:#2563eb;
        padding:15px;
        text-align:center;
        font-size:24px;
        font-weight:bold;
    }

    #chat{
        height:400px;
        overflow-y:auto;
        padding:10px;
    }

    .msg{
        padding:10px;
        margin:8px 0;
        border-radius:10px;
        max-width:80%;
    }

    .user{
        background:#2563eb;
        margin-left:auto;
    }

    .bot{
        background:#334155;
    }

    .bottom{
        display:flex;
        border-top:1px solid #475569;
    }

    input{
        flex:1;
        padding:15px;
        border:none;
        outline:none;
        background:#0f172a;
        color:white;
        font-size:16px;
    }

    button{
        border:none;
        padding:15px;
        background:#2563eb;
        color:white;
        cursor:pointer;
    }

    button:hover{
        background:#1d4ed8;
    }

    .help{
        padding:8px;
        font-size:12px;
        color:#94a3b8;
        text-align:center;
    }
</style>
</head>
<body>

<div class="app">

    <div class="top">Hexy AI</div>

    <div id="chat"></div>

    <div class="bottom">
        <input type="text" id="input" placeholder="Talk to Hexy...">
        <button onclick="send()">Send</button>
    </div>

    <div class="help">
        Teach Hexy with: learn: question = answer
    </div>

</div>

<script>

const chat = document.getElementById("chat");
const input = document.getElementById("input");

// Browser memory
let memory = JSON.parse(localStorage.getItem("hexyMemory")) || {};

function addMessage(text, type){

    let div = document.createElement("div");

    div.className = "msg " + type;
    div.innerText = text;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

function saveMemory(){
    localStorage.setItem("hexyMemory", JSON.stringify(memory));
}

function aiResponse(message){

    let msg = message.toLowerCase();

    // Learned responses
    if(memory[msg]){
        return memory[msg];
    }

    // Built in responses
    if(msg.includes("hello") || msg.includes("hi")){
        return "Hello! I'm Hexy 👋";
    }

    if(msg.includes("your name")){
        return "My name is Hexy AI!";
    }

    if(msg.includes("how are you")){
        return "I'm doing great!";
    }

    if(msg.includes("bye")){
        return "Goodbye!";
    }

    // Learning mode
    if(msg.startsWith("learn:")){

        let parts = message.substring(6).split("=");

        if(parts.length >= 2){

            let question = parts[0].trim().toLowerCase();
            let answer = parts[1].trim();

            memory[question] = answer;

            saveMemory();

            return "I learned: " + question;
        }

        return "Use format: learn: question = answer";
    }

    return "I don't know that yet. Teach me using: learn: question = answer";
}

function send(){

    let text = input.value.trim();

    if(text === "") return;

    addMessage(text, "user");

    let response = aiResponse(text);

    setTimeout(()=>{
        addMessage(response, "bot");
    },300);

    input.value = "";
}

input.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        send();
    }
});

addMessage("Hello! I am Hexy AI 🤖", "bot");

</script>

</body>
</html>
